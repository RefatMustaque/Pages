<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Scraper Cover</title>
  <desc id="desc">A clean cover image for the GitHub Scraper blog post.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="-60" r="260" fill="#0ea5e9" opacity="0.16"/>
  <circle cx="120" cy="660" r="250" fill="#22d3ee" opacity="0.12"/>

  <g transform="translate(90 96)">
    <rect x="0" y="0" width="1020" height="438" rx="20" fill="#0b1220" stroke="#334155"/>

    <text x="44" y="86" fill="#e2e8f0" font-size="52" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700">
      GitHub Scraper
    </text>
    <rect x="44" y="108" width="420" height="8" rx="4" fill="url(#accent)"/>

    <text x="44" y="170" fill="#cbd5e1" font-size="30" font-family="'Space Grotesk', Arial, sans-serif" font-weight="500">
      Download Repositories as TXT or HTML
    </text>

    <g transform="translate(44 220)">
      <rect x="0" y="0" width="930" height="170" rx="12" fill="#111827" stroke="#1f2937"/>
      <text x="28" y="52" fill="#93c5fd" font-size="26" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700">
        Features
      </text>
      <text x="28" y="98" fill="#e5e7eb" font-size="22" font-family="'Space Grotesk', Arial, sans-serif">
        - GitHub OAuth Login
      </text>
      <text x="28" y="132" fill="#e5e7eb" font-size="22" font-family="'Space Grotesk', Arial, sans-serif">
        - Single TXT Export
      </text>
      <text x="440" y="98" fill="#e5e7eb" font-size="22" font-family="'Space Grotesk', Arial, sans-serif">
        - Interactive HTML View
      </text>
      <text x="440" y="132" fill="#e5e7eb" font-size="22" font-family="'Space Grotesk', Arial, sans-serif">
        - Search and Copy Support
      </text>
    </g>
  </g>
</svg>
