<svg width="720" height="320" viewBox="0 0 720 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="320" fill="#fff"/>
  <text x="120" y="40" font-size="22" font-family="Arial" fill="#d32f2f" font-weight="bold">Before: Manual Deploy</text>
  <rect x="40" y="60" width="260" height="200" rx="16" fill="#ffeaea" stroke="#d32f2f" stroke-width="2"/>
  <text x="60" y="100" font-size="16" font-family="Arial" fill="#d32f2f">Build Locally</text>
  <text x="60" y="130" font-size="16" font-family="Arial" fill="#d32f2f">Upload via FTP/SSH</text>
  <text x="60" y="160" font-size="16" font-family="Arial" fill="#d32f2f">Manual Backup</text>
  <text x="60" y="190" font-size="16" font-family="Arial" fill="#d32f2f">Manual Restart</text>
  <text x="60" y="220" font-size="16" font-family="Arial" fill="#d32f2f">Check App</text>
  <text x="420" y="40" font-size="22" font-family="Arial" fill="#388e3c" font-weight="bold">After: Automated Deploy</text>
  <rect x="380" y="60" width="300" height="200" rx="16" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="400" y="100" font-size="16" font-family="Arial" fill="#388e3c">Build in CI (GitHub Actions)</text>
  <text x="400" y="130" font-size="16" font-family="Arial" fill="#388e3c">Auto Backup</text>
  <text x="400" y="160" font-size="16" font-family="Arial" fill="#388e3c">Auto Upload</text>
  <text x="400" y="190" font-size="16" font-family="Arial" fill="#388e3c">Auto Restart</text>
  <text x="400" y="220" font-size="16" font-family="Arial" fill="#388e3c">Auto Check</text>
  <line x1="300" y1="160" x2="380" y2="160" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="315" y="150" font-size="14" font-family="Arial" fill="#888">CI/CD</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L3,5 Z" fill="#888" />
    </marker>
  </defs>
</svg>
