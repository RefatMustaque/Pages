---
layout: default
---

<article class="post-page">
  <header class="post-hero">
    <p class="eyebrow">Technical Guide</p>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
    {% if page.image %}
      <figure class="post-cover">
        <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
      </figure>
    {% endif %}
  </header>
  <section class="prose">
    {{ content }}
  </section>
</article>
