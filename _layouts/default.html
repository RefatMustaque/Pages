<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  </head>
  <body class="{% if page.url == '/' %}page-home{% elsif page.layout == 'post' %}page-post{% else %}page-default{% endif %}">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="site-bg-grid" aria-hidden="true"></div>
    <div class="site-bg-blob site-bg-blob-a" aria-hidden="true"></div>
    <div class="site-bg-blob site-bg-blob-b" aria-hidden="true"></div>

    <header class="site-header wrap" role="banner">
      <div class="brand-group">
        <a class="brand" href="{{ '/' | relative_url }}">
          <img class="brand-icon" src="{{ '/favicon.svg' | relative_url }}" alt="" aria-hidden="true">
          <span>{{ site.title }}</span>
        </a>
        <p class="tagline">{{ site.description }}</p>
      </div>

      <div class="header-actions">
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/#posts' | relative_url }}">Posts</a>
          <div class="nav-dropdown">
            <button class="nav-dropdown-toggle" type="button" aria-expanded="false" aria-controls="nav-dropdown-menu">More ▾</button>
            <ul class="nav-dropdown-menu" id="nav-dropdown-menu" role="menu">
              <li><a role="menuitem" href="https://refatmustaque.com" target="_blank" rel="noopener">Portfolio</a></li>
              <li><a role="menuitem" href="https://githubscrapper.refatmustaque.com" target="_blank" rel="noopener">GitHub Scrapper</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main id="main-content" class="wrap site-main {% if page.url == '/' %}site-main-home{% elsif page.layout == 'post' %}site-main-post{% else %}site-main-default{% endif %}">
      {{ content }}
    </main>

    <footer class="site-footer wrap">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </footer>

    <script src="{{ '/assets/js/posts-controls.js' | relative_url }}" defer></script>
  </body>
</html>
