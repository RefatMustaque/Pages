<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  </head>
  <body>
    <div class="bg-glow"></div>
    <header class="site-header wrap">
      <div>
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="tagline">{{ site.description }}</p>
      </div>
      <div class="header-actions">
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/#posts' | relative_url }}">Posts</a>
          <div class="nav-dropdown">
            <button class="nav-dropdown-toggle" type="button">More ▾</button>
            <ul class="nav-dropdown-menu">
              <div class="nav-dropdown-menu-inner">
                <li><a href="https://refatmustaque.com" target="_blank" rel="noopener">Portfolio</a></li>
                <li><a href="https://githubscrapper.refatmustaque.com" target="_blank" rel="noopener">GitHub Scrapper</a></li>
              </div>
            </ul>
          </div>
        </nav>
      </div>
    </header>
    <main class="wrap content-shell">
      {{ content }}
    </main>
    <footer class="site-footer wrap">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </footer>
    <script src="{{ '/assets/js/posts-controls.js' | relative_url }}" defer></script>
  </body>
</html>
